<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BHC 중량표시제 정리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1814;
    --muted: #7a7670;
    --tab1: #d4380d;
    --tab2: #1d6fa4;
    --tab3: #d48806;
    --tab4: #389e0d;
    --tab1-light: #fff2e8;
    --tab2-light: #e6f4ff;
    --tab3-light: #fffbe6;
    --tab4-light: #f6ffed;
    --radius: 6px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    color: var(--tab1);
    letter-spacing: -0.5px;
  }

  .logo span {
    color: var(--text);
    font-weight: 300;
    font-size: 16px;
    margin-left: 4px;
  }

  .tabs {
    display: flex;
    gap: 0;
  }

  .tab-btn {
    padding: 10px 24px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 3px solid transparent;
    transition: all 0.18s ease;
    white-space: nowrap;
    letter-spacing: 0;
  }

  .tab-btn:hover { color: var(--text); }

  .tab-btn[data-tab="0"] { --c: var(--tab1); }
  .tab-btn[data-tab="1"] { --c: var(--tab2); }
  .tab-btn[data-tab="2"] { --c: var(--tab3); }
  .tab-btn[data-tab="3"] { --c: var(--tab4); }

  .tab-btn.active {
    color: var(--c);
    border-bottom-color: var(--c);
    font-weight: 700;
  }

  main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  .panel { display: none; animation: fadeIn 0.2s ease; }
  .panel.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .panel-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 18px;
  }

  .panel-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .panel-count {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  .search-wrap {
    margin-bottom: 14px;
  }

  .search-input {
    padding: 8px 14px;
    font-family: inherit;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    width: 280px;
    outline: none;
    transition: border-color 0.15s;
    color: var(--text);
  }

  .search-input:focus { border-color: #aaa; }

  .table-wrap {
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: auto;
    max-height: calc(100vh - 220px);
    box-shadow: var(--shadow);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  thead tr { background: #f9f8f6; }

  th {
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  td {
    padding: 10px 16px;
    border-bottom: 1px solid #f0ede8;
    vertical-align: top;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: keep-all;
  }

  tr:last-child td { border-bottom: none; }

  tbody tr:hover td { background: #faf9f7; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-치킨 { background: #fff2e8; color: #d4380d; }
  .badge-사이드 { background: #f6ffed; color: #389e0d; }
  .badge-피자 { background: #e6f4ff; color: #1d6fa4; }
  .badge-시즈닝 { background: #fffbe6; color: #d48806; }

  .no-results {
    padding: 48px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  /* 알레르기 트리 */
  .allergy-grid {
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .allergy-group {
    margin-bottom: 20px;
  }

  .allergy-group:last-child { margin-bottom: 0; }

  .allergy-parent {
    font-size: 14px;
    font-weight: 700;
    color: var(--tab3);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .allergy-children {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-left: 12px;
  }

  .allergy-chip {
    background: var(--tab3-light);
    color: #7c5e00;
    border: 1px solid #ffe08a;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">BHC <span>중량표시제 정리</span></div>
  </div>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="0" onclick="switchTab(0)">원산지</button>
    <button class="tab-btn" data-tab="1" onclick="switchTab(1)">영양성분표기</button>
    <button class="tab-btn" data-tab="2" onclick="switchTab(2)">알레르기</button>
    <button class="tab-btn" data-tab="3" onclick="switchTab(3)">중량표시</button>
  </nav>
</header>

<main>

  <!-- 원산지 -->
  <div class="panel active" id="panel-0">
    <div class="panel-header">
      <div class="panel-title">원산지</div>
      <div class="panel-count" id="count-0"></div>
    </div>
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="메뉴명 검색..." oninput="filterTable('table-0', this.value, 'count-0')">
    </div>
    <div class="table-wrap">
      <table id="table-0">
        <thead><tr><th>구분</th><th>메뉴명</th><th>원산지 표기</th></tr></thead>
        <tbody id="body-0"></tbody>
      </table>
      <div class="no-results" id="no-0" style="display:none">검색 결과가 없습니다.</div>
    </div>
  </div>

  <!-- 영양성분표기 -->
  <div class="panel" id="panel-1">
    <div class="panel-header">
      <div class="panel-title">영양성분표기</div>
      <div class="panel-count" id="count-1"></div>
    </div>
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="메뉴명 검색..." oninput="filterTable('table-1', this.value, 'count-1')">
    </div>
    <div class="table-wrap">
      <table id="table-1">
        <thead><tr><th>구분</th><th>메뉴명</th><th>나트륨</th><th>탄수화물</th><th>당류</th><th>지방</th><th>트랜스지방</th><th>포화지방</th><th>콜레스테롤</th><th>단백질</th><th>총내용량</th><th>100g당 kcal</th></tr></thead>
        <tbody id="body-1"></tbody>
      </table>
      <div class="no-results" id="no-1" style="display:none">검색 결과가 없습니다.</div>
    </div>
  </div>

  <!-- 알레르기 -->
  <div class="panel" id="panel-2">
    <div class="panel-header">
      <div class="panel-title">알레르기</div>
    </div>
    <div class="allergy-grid" id="allergy-grid"></div>
  </div>

  <!-- 중량표시 -->
  <div class="panel" id="panel-3">
    <div class="panel-header">
      <div class="panel-title">중량표시</div>
      <div class="panel-count" id="count-3"></div>
    </div>
    <div class="table-wrap">
      <table id="table-3">
        <thead><tr><th>구분</th><th>중량 및 조각수</th><th>적용 메뉴</th></tr></thead>
        <tbody id="body-3"></tbody>
      </table>
    </div>
  </div>

</main>

// ── 렌더링 ──────────────────────────────────────────────

function badge(cat) {
  return `<span class="badge badge-${cat}">${cat}</span>`;
}

function renderOrigin() {
  const tbody = document.getElementById('body-0');
  tbody.innerHTML = origin.map(r =>
    `<tr><td>${badge(r[0])}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`
  ).join('');
  updateCount('count-0', origin.length, origin.length);
}

function renderNutrition() {
  const tbody = document.getElementById('body-1');
  tbody.innerHTML = nutrition.map(r =>
    `<tr><td>${badge(r[0])}</td><td>${r[1]}</td>${r.slice(2).map(c=>`<td>${c}</td>`).join('')}</tr>`
  ).join('');
  updateCount('count-1', nutrition.length, nutrition.length);
}

function renderAllergy() {
  const grid = document.getElementById('allergy-grid');
  grid.innerHTML = allergyGroups.map(g => `
    <div class="allergy-group">
      <div class="allergy-parent">▸ ${g.parent}</div>
      <div class="allergy-children">
        ${g.children.map(c => `<span class="allergy-chip">${c}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function renderWeight() {
  const tbody = document.getElementById('body-3');
  tbody.innerHTML = weight.map(r =>
    `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`
  ).join('');
  updateCount('count-3', weight.length, weight.length);
}

function updateCount(id, shown, total) {
  const el = document.getElementById(id);
  if (el) el.textContent = shown === total ? `총 ${total}개` : `${shown} / ${total}개`;
}

// ── 검색 ──────────────────────────────────────────────

function filterTable(tableId, query, countId) {
  const rows = document.querySelectorAll(`#${tableId} tbody tr`);
  const q = query.trim().toLowerCase();
  let shown = 0;
  rows.forEach(tr => {
    const match = !q || tr.textContent.toLowerCase().includes(q);
    tr.style.display = match ? '' : 'none';
    if (match) shown++;
  });
  const total = rows.length;
  updateCount(countId, shown, total);
  const noEl = document.getElementById(tableId.replace('table', 'no'));
  if (noEl) noEl.style.display = shown === 0 ? 'block' : 'none';
}

// ── 탭 전환 ──────────────────────────────────────────────

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === idx));
  // URL hash 업데이트
  const ids = ['원산지', '영양성분표기', '알레르기', '중량표시'];
  history.replaceState(null, '', '#' + ids[idx]);
}

// URL hash로 초기 탭 설정
const hashMap = {'원산지': 0, '영양성분표기': 1, '알레르기': 2, '중량표시': 3};
const hash = decodeURIComponent(location.hash.replace('#', ''));
if (hashMap[hash] !== undefined) switchTab(hashMap[hash]);
